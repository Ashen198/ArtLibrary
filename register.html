<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ARTlibrary</title>
    <link rel="stylesheet" href="assets/css/nice-select2.css" />

    <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
    <div class="auth-wrapper" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="auth-card">
            <h2>Create an Account</h2>
            <p class="subtitle">Join the ARTlibrary community today</p>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Register</button>
            </form>
            
            <p class="footer-text">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
</body>
</html>
